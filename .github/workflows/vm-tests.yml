name: VM integration tests

on:
  pull_request:
    branches: [main]

jobs:
  vm:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Install qemu + cloud-utils
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 qemu-utils cloud-image-utils openssh-client

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build lux + luxd
        run: cargo build --release --bin lux --bin luxd

      - name: Run VM scenarios
        run: sudo -E bash tests/vm/run.sh

      - name: Upload VM serial log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: vm-serial-log
          path: /tmp/lux-vm-*.log
          if-no-files-found: ignore
