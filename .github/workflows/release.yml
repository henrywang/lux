name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} --bin lux --bin luxd

      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../lux-${{ matrix.target }}.tar.gz lux luxd
          cd ../../..

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: lux-${{ matrix.target }}
          path: lux-${{ matrix.target }}.tar.gz

  bundle-x86_64:
    name: Bundle portable x86_64
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download x86_64 build
        uses: actions/download-artifact@v8
        with:
          name: lux-x86_64-unknown-linux-gnu
          path: build

      - name: Extract lux + luxd
        run: tar xzf build/lux-x86_64-unknown-linux-gnu.tar.gz -C build/

      - name: Download ollama
        run: |
          curl -fsSL https://ollama.com/download/ollama-linux-amd64.tgz -o ollama.tgz
          mkdir ollama-unpack
          tar xzf ollama.tgz -C ollama-unpack

      - name: Pre-pull henrywang/lux
        run: |
          mkdir -p bundle/models
          OLLAMA_BIN="$(find ollama-unpack -name ollama -type f | head -n1)"
          OLLAMA_HOST=127.0.0.1:11500 OLLAMA_MODELS="$PWD/bundle/models" "$OLLAMA_BIN" serve &
          for _ in $(seq 1 30); do
            curl -sf http://127.0.0.1:11500/api/tags >/dev/null && break
            sleep 1
          done
          OLLAMA_HOST=127.0.0.1:11500 "$OLLAMA_BIN" pull henrywang/lux
          kill %1 || true
          wait %1 2>/dev/null || true

      - name: Assemble tarball
        run: |
          mkdir -p bundle/systemd
          cp build/lux build/luxd bundle/
          # Ollama ships as bin/ollama + lib/ollama/*.so; preserve that layout.
          if [ -d ollama-unpack/bin ]; then
            cp -r ollama-unpack/bin ollama-unpack/lib bundle/ 2>/dev/null || true
            # Surface the launcher at the top of the bundle so the Rust side
            # can find `./ollama` next to `./lux`.
            ln -s bin/ollama bundle/ollama
          else
            cp ollama-unpack/ollama bundle/ollama
          fi
          cp systemd/luxd.service bundle/systemd/
          cp docs/portable-readme.md bundle/README.md
          mv bundle lux-portable-linux-x86_64
          tar czf lux-portable-linux-x86_64.tar.gz lux-portable-linux-x86_64/
          ls -lh lux-portable-linux-x86_64.tar.gz

      - name: Upload to Hugging Face Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          pip install --quiet huggingface_hub
          hf upload \
            henrywangxf/lux-portable \
            lux-portable-linux-x86_64.tar.gz \
            "lux-portable-linux-x86_64-${GITHUB_REF_NAME}.tar.gz" \
            --repo-type model \
            --token "$HF_TOKEN"

  release:
    name: Create Release
    needs: [build, bundle-x86_64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          files: artifacts/**/*
          generate_release_notes: true
          body: |
            ## Portable bundle (standalone, ~4 GB)

            Lux + luxd + ollama + pre-pulled `henrywang/lux` weights — extract and run, no system install or network required.

            **Download:** https://huggingface.co/henrywangxf/lux-portable/resolve/main/lux-portable-linux-x86_64-${{ github.ref_name }}.tar.gz

            ```
            tar xzf lux-portable-linux-x86_64-${{ github.ref_name }}.tar.gz
            cd lux-portable-linux-x86_64/
            ./lux
            ```

            ## Raw binaries

            Attached below. Requires an existing ollama server; see the repo README for install steps.
