name: Sync HF model card

on:
  push:
    branches: [main]
    paths:
      - docs/hf-model-card.md
      - .github/workflows/hf-model-card.yml
  workflow_dispatch:

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Upload to Hugging Face Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          pip install --quiet huggingface_hub
          hf upload \
            henrywangxf/lux-portable \
            docs/hf-model-card.md \
            README.md \
            --repo-type model \
            --token "$HF_TOKEN" \
            --commit-message "sync model card from ${{ github.sha }}"
