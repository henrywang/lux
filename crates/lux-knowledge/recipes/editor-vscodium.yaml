name: editor-vscodium
summary: "VSCodium (telemetry-free VSCode) from official repos + Python/Jupyter extensions"

# Distro-dispatched install using VSCodium's own repos
# (https://vscodium.com/#install). Native binary — no sandbox, ~/.config
# paths work directly, extensions via `codium --install-extension`.

steps:
  - shell: |
      set -euo pipefail
      if command -v dnf >/dev/null 2>&1; then
        sudo rpmkeys --import https://gitlab.com/paulcarroty/vscodium-deb-rpm-repo/raw/master/pub.gpg
        printf '%s\n' \
          '[gitlab.com_paulcarroty_vscodium_repo]' \
          'name=download.vscodium.com' \
          'baseurl=https://download.vscodium.com/rpms/' \
          'enabled=1' \
          'gpgcheck=1' \
          'repo_gpgcheck=1' \
          'metadata_expire=1h' \
          'gpgkey=https://gitlab.com/paulcarroty/vscodium-deb-rpm-repo/raw/master/pub.gpg' \
          | sudo tee /etc/yum.repos.d/vscodium.repo >/dev/null
        sudo dnf install -y codium
      elif command -v apt-get >/dev/null 2>&1; then
        sudo install -d -m 0755 /usr/share/keyrings
        curl -fsSL https://gitlab.com/paulcarroty/vscodium-deb-rpm-repo/raw/master/pub.gpg \
          | sudo gpg --dearmor --yes -o /usr/share/keyrings/vscodium-archive-keyring.gpg
        echo 'deb [signed-by=/usr/share/keyrings/vscodium-archive-keyring.gpg] https://download.vscodium.com/debs vscodium main' \
          | sudo tee /etc/apt/sources.list.d/vscodium.list >/dev/null
        sudo apt-get update
        sudo apt-get install -y codium
      elif command -v pacman >/dev/null 2>&1; then
        echo "VSCodium isn't in Arch's official repos." >&2
        echo "Install from AUR (paru -S vscodium-bin) or see https://vscodium.com/#install" >&2
        exit 1
      else
        echo "Unsupported distro for VSCodium install" >&2
        exit 1
      fi
    describe: Install VSCodium from the official VSCodium repo

  - shell: codium --install-extension ms-python.python --force
    describe: Install Python extension
    optional: true

  - shell: codium --install-extension ms-toolsai.jupyter --force
    describe: Install Jupyter extension
    optional: true

  - shell: codium --install-extension rust-lang.rust-analyzer --force
    describe: Install rust-analyzer extension
    optional: true
